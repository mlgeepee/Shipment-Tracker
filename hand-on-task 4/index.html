<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word, Sentence, Paragraph Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Text Generator</h1>
        <p class="subtitle">
          Generate words, sentences, and paragraphs with emphasis effects
        </p>
      </header>

      <div class="controls">
        <div class="control-group">
          <label for="generatorType">Generator Type:</label>
          <select id="generatorType">
            <option value="word">Word</option>
            <option value="sentence">Sentence</option>
            <option value="paragraph">Paragraph</option>
          </select>
        </div>

        <div class="control-group">
          <label for="count">Count:</label>
          <input type="number" id="count" min="1" max="100" value="5" />
        </div>

        <div class="control-group">
          <label for="emphasis">Emphasis:</label>
          <select id="emphasis">
            <option value="none">None</option>
            <option value="first">First Word</option>
            <option value="random">Random Word</option>
            <option value="all">All Words</option>
          </select>
        </div>

        <button id="generateBtn" class="generate-btn">Generate</button>
        <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
      </div>

      <div class="output-container">
        <div id="output" class="output" contenteditable="true"></div>
      </div>

      <div class="stats">
        <span id="wordCount">Words: 0</span>
        <span id="charCount">Characters: 0</span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
